# ---- MiMo Hero 配置 ----------------------------------------
hero_name: "林雨生"
hero_pattern: "林 雨 生"
hero_pattern_en: "LIN YUSHENG"
hero_title: "HELLO, 世界"
hero_title_alt: "你好，我是林雨生"
hero_about: |
  欢迎来到我的主页——一个我与世界对话的空间。

  我是一名**具身智能与机器人学习**方向的研究者。我的工作聚焦于**VLA（Vision-Language-Action）模型**、**机器人仿真**以及**3D 场景重建**。

  我相信，智能的本质在于**预测与压缩**——从海量多模态数据中提炼出世界的内在规律，让机器不仅能理解语言，更能感知物理空间并在其中行动。

  目前主要研究方向：VLA 基础模型（RT-2, OpenVLA, π₀ 等）的分析与改进；Isaac Sim + MuJoCo 双引擎仿真平台开发；3D Gaussian Splatting 场景重建与数据生成；机器人操作策略的 Sim-to-Real 迁移。

  **—— 林雨生**

# ---- al-folio 风格配置 -------------------------------------
lang: "zh"
timezone: Asia/Shanghai

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:title/
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

paginate: 5
paginate_path: "/blog/page:num/"

# Collections
collections:
  news:
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/
  posts:
    output: true
    permalink: /blog/:year/:title/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "news"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
